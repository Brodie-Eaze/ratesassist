# Dependabot config — RatesAssist
# Weekly npm dependency monitoring across the workspace root.
# Patch + minor updates grouped into a single PR per week.
# Major bumps go to separate PRs (manual review for Next.js, React, etc.).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Australia/Perth"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Group minor + patch updates into one weekly PR.
    # Major bumps fall through as individual PRs (require manual review).
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      security-patches:
        applies-to: security-updates
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Australia/Perth"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "ci"
